name: Build Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install pyenv and Python 2
        run: |
          # Install dependencies for pyenv
          sudo apt-get update
          sudo apt-get install -y libssl-dev zlib1g-dev libbz2-dev \
            libreadline-dev libsqlite3-dev wget curl llvm \
            libncurses5-dev libncursesw5-dev xz-utils tk-dev \
            libffi-dev liblzma-dev python3-openssl git

          # Install pyenv and install Python 2.7.18 (latest Python 2 release)
          curl https://pyenv.run | bash
          echo 'export PATH="$HOME/.pyenv/bin:$PATH"' >> ~/.bashrc
          echo 'eval "$(pyenv init --path)"' >> ~/.bashrc
          echo 'eval "$(pyenv init -)"' >> ~/.bashrc
          source ~/.bashrc

          # Install Python 2.7.18 using pyenv
          pyenv install 2.7.18
          pyenv global 2.7.18

          # Check Python 2 version
          python --version  # Should show Python 2.7.18
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Run autogen and configure with Python 2
        run: |
          ./autogen.sh  # or autoreconf -fvi
          # Use python2 (installed via pyenv) for the configuration step
          ./configure --with-python=python2  # Configure the build system
      - name: Build the wheel
        run: |
          cd py
          python3 setup.py bdist_wheel  # Build the wheel with Python 3
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_linux_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} py/dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"
