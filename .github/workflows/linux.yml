name: Build Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  py3mod:
    name: py3mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Set up python
        uses: actions/setup-python@v4.4.0
        with:
          python-version-file: py/.python-version
          cache: 'poetry'

      - name: Install dependencies
        run:  |
          cd py
          poetry install

      - name: Build Python extension
        run: |
          cd py
          poetry run python setup.py clean --all
          poetry run python setup.py build_ext --inplace