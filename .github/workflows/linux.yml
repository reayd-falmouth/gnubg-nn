name: Build Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install Python 2 and dependencies
        run: |
          sudo apt-get update
          # Add the deadsnakes PPA and install python2 and python2-dev
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python2 python2-dev autoconf automake libtool gcc g++ make
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Run autogen and configure with Python 2
        run: |
          ./autogen.sh  # or autoreconf -fvi
          # Use python2 for the configuration step
          ./configure --with-python=python2  # Configure the build system
      - name: Build the wheel
        run: |
          cd py
          python3 setup.py bdist_wheel  # Build the wheel with Python 3
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_linux_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} py/dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"
