name: Build Wheels

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Build wheel
        run: python setup.py bdist_wheel
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_linux_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Build wheel
        run: python setup.py bdist_wheel
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_macOS_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Build wheel
        run: python setup.py bdist_wheel
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_windows_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  upload-to-pypi:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]  # Make sure wheels are built first
    steps:
      - name: Upload to PyPI (Test PyPI)
        run: |
          python -m pip install --upgrade twine
          twine upload --repository testpypi dist/*  # You can replace testpypi with pypi for production

