name: Build Wheels

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python 2 and Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python2 python2-dev python3 python3-dev
          # Install necessary build dependencies
          sudo apt-get install -y autoconf automake libtool gcc g++ make
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Run autogen and configure with Python 2
        run: |
          ./autogen.sh  # or autoreconf -fvi
          ./configure --with-python=python2  # Configure the build system
      - name: Build the wheel
        run: |
          cd py
          python3 setup.py bdist_wheel  # Build the wheel with Python 3
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_linux_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} py/dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python 2 and Python 3
        run: |
          brew install python@2  # Install Python 2 on macOS
          brew install autoconf automake libtool gcc make
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Run autogen and configure with Python 2
        run: |
          ./autogen.sh  # or autoreconf -fvi
          ./configure --with-python=python2   # Configure the build system
      - name: Build the wheel
        run: |
          cd py
          python3 setup.py bdist_wheel  # Build the wheel with Python 3
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_macOS_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} py/dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python 2 and Python 3
        run: |
          choco install python2
          choco install autoconf automake libtool make
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      - name: Run autogen and configure with Python 2
        run: |
          ./autogen.sh  # or autoreconf -fvi
          ./configure --with-python=python2  # Configure the build system
      - name: Build the wheel
        run: |
          cd py
          python3 setup.py bdist_wheel  # Build the wheel with Python 3
      - name: Upload wheel to GitHub release
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          curl -sL https://github.com/cli/cli/releases/download/v2.1.0/gh_2.1.0_windows_amd64.tar.gz | tar xz
          ./gh_*/bin/gh release create v${{ github.run_number }} py/dist/*.whl --title "Build v${{ github.run_number }}" --notes "Wheel build from GitHub Actions"

  upload-to-pypi:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]  # Make sure wheels are built first
    steps:
      - name: Upload to PyPI (Test PyPI)
        run: |
          python -m pip install --upgrade twine
          twine upload --repository testpypi py/dist/*  # You can replace testpypi with pypi for production
