name: CI Tests

on:
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    name: Run tests on Ubuntu Latest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf automake \
            pkg-config \
            python3-dev \
            libgtk-3-dev \
            libssl-dev \
            zlib1g-dev

      - name: Generate configure script & configure
        run: |
          autoreconf -i
          ./configure

      - name: Set up Python
        uses: actions/setup-python@v4.4.0
        with:
          python-version-file: py/.python-version

      - name: Install Python dependencies
        working-directory: py
        run: make install

      - name: Build Python extension
        working-directory: py
        run: make build

      - name: Run test suite
        working-directory: py
        run: make test
